<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Citas y Reservas</title>
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon" />
    
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    
    <link rel="stylesheet" href="../styles/calendario.css">
</head>
<body>

    <header class="header">
        <h1>Agenda tu cita</h1>
        <p>Gracias por iniciar sesion, ahora puedes agendar la cita para tu mascota</p>
    </header>

    <div class="container">
        <div class="calendar-section">
            <h2 class="section-title">🗓️ Calendario de Disponibilidad</h2>
            <div id="calendar"></div>
            </div>
        
        <div class="form-section">
            <h2 class="section-title">📝 Agendar Cita</h2>
            
            <form id="appointmentForm">
                
                <div class="form-group">
                    <label for="fecha">Fecha Seleccionada:</label>
                    <input type="text" id="fecha" name="fecha" readonly required>
                </div>
                
                <div class="form-group">
                    <label for="hora">Hora:</label>
                    <select id="hora" name="hora" required>
                        <option value="">-- Selecciona una hora --</option>
                    </select>
                </div>
                
                <hr>
                
                <div class="form-group">
                    <label for="nombre">Nombre de la mascota</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                
                <div class="form-group">
                    <label for="servicio">Servicio requerido</label>
                    <select id="servicio" name="servicio" required>
                        <option value="">-- Selecciona un servicio --</option>
                        <option value="Bano_sencillo">Baño sencillo</option>
                        <option value="Bano_especial">Baño especial</option>
                        <option value="Bano_antipulgas">Baño antipulgas</option>
                        <option value="Limpieza_de_oidos">Limpieza de oídos</option>
                        <option value="Corte_de_unas">Corte de uñas</option>
                        <option value="Corte_higienico">Corte higiénico</option>
                        <option value="Corte_estetico">Corte estético</option>
                        <option value="Masaje_antiestres">Masaje antiestrés</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email">
                </div>
                
                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>
                
                <div class="form-group">
                    <label for="notas">Recomendaciones/alergias del animal</label>
                    <textarea id="notas" name="notas" rows="3"></textarea>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Guardar Cita</button>
                    <button type="reset" class="btn btn-secondary">Limpiar Formulario</button>
                </div><br>

            </form>
            <a href="bienvenida.html"><button type="submit" class="btn btn-secondary">Volver</button></a>
            
            <p id="message" class="hidden"></p>
        </div>
    </div>
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <script src="jva.js"></script>
</body>
</html>
